<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denúncia de Maus-Tratos</title>

    <link rel="stylesheet" href="../CSS/Denuncias_style.css">
    <link rel="stylesheet" href="../CSS/Estilo_style.css">
</head>

<body>

    <header class="cabecalho-superior">

        <div class="logo-arca">
            <img src="../IMG/arca-removebg-preview.png" alt="Programa ARCA">
        </div>

        <nav class="menu-navegacao">
            <a href="#">Início</a>
            <a href="#">Perfil</a>
            <a href="#">Ajuda</a>
        </nav>

        <div class="area-icones">
            <span class="icone-configuracao">⚙</span>
            <img src="../IMG/sino.png" alt="Notificações">

        </div>

    </header>

    <main class="conteudo">

        <section class="cabecalho-pagina">

            <div class="caminho-pagina">
                SERVIÇOS / DENÚNCIA
            </div>

            <h1 class="titulo-pagina">
                ‹ Denúncia de Maus-Tratos
            </h1>

            <p class="subtitulo-pagina">
                Registre uma denúncia de forma segura e anônima
            </p>

        </section>

        <section class="cartao">

            <h2 class="titulo-secao">
                Detalhes da Denúncia
            </h2>

            <div class="grade-formulario">

                <textarea placeholder="Descreva detalhadamente o incidente de maus-tratos..."
                    class="campo-inteiro"></textarea>

                <input type="text" placeholder="Endereço completo ou referência">

                <select>
                    <option>Selecione Espécie</option>
                    <option>Cachorro</option>
                    <option>Gato</option>
                </select>

                <div class="mapa campo-inteiro">

                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d12594.796413486143!2d-40.27079796092201!3d-20.19838958248505!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xb81ff105549a61%3A0x409c2919913258a7!2sSerra%20-%20ES!5e0!3m2!1spt-PT!2sbr!4v1778539314386!5m2!1spt-PT!2sbr"
                        width="100%"
                        height="250"
                        style="border:0;"
                        allowfullscreen=""
                        loading="lazy">
                    </iframe>

                </div>

                <div class="upload-arquivo campo-inteiro">
                    <input type="file">
                </div>

            </div>

            <div class="declaracao-legal">

                <h2 class="titulo-secao">
                    Declaração Legal
                </h2>

                <div class="caixa-declaracao">
                    <input type="checkbox">

                    Declaro estar ciente de que informações falsas podem gerar
                    consequências legais.
                </div>

            </div>

            <div class="area-botoes">

                <button class="botao-cancelar">
                    Cancelar
                </button>

                <button class="botao-confirmar">
                    Enviar Denúncia
                </button>

            </div>

        </section>

    </main>

    <footer class="rodape">
        © Copyright GroupTwo
    </footer>

</body>

</html>
