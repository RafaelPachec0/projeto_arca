<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/IMAGE/Icon Logo.png" type="image/png">
    <link rel="stylesheet" href="/CSS/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <title> Login | ARCA </title>
</head>

<body class="body-login">
    <main class="main-login">
        <div class="box-login">

            <img src="/IMG/Rebranding Logo.png" alt="Logo ARCA" width="100%">

            <b>
                <p> Sua próxima boa ação começa aqui! Faça login ou cadastre-se para acessar os nossos serviços.           
                </p>
            </b>

            <br>
            <form action="" method="post" id="loginForm">
            <div class="input-group">
                <span class="icon"> &#x1F464 </span>
                <input type="text" placeholder="Usuário" id="Usuario" />
            </div>

            <br>

            <div class="input-group">
                <span> &#128274 </span>
                <input type="password" placeholder="Senha" id="Senha"/>
            </div>

            <br>

            <div class="links-login">
                <a href=""> Esqueceu a senha?</a>
                <p>Não possui cadastro? <a href="">Cadastre-se</a>
                </p>
            </div>

            <br>
            
            <button class="botao-login" type="submit"> <b>LOGIN</b> </button>
            </form>
        </div>

    </main>
    <script src="index.js"></script>
</body>


</html>
