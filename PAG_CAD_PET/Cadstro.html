<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Pet</title>

    <link rel="stylesheet" href="../CSS/Cadastro_style.css">
    <link rel="stylesheet" href="../CSS/Estilo_style.css">
</head>

<body>
    <header>
        <div class="logo">
            <h2>Projeto ARCA</h2>
        </div>

        <nav class="menu-central">
            <a href="../index.html" class="selec">Início</a>
            <a href="./pag_perfil.html" class="selec">Perfil</a>
            <a href="../PAG_AJUDA/pag_ajuda.html" class="selec">Ajuda</a>
        </nav>

        <div class="icones-apoio">
            <a href="#" class="selec icon">
                <img src="../ICONES/config.png" alt="Configurações" height="30px" width="30px" />
            </a>
            <a href="../PAG_NOTIFICACAO/pag_notificacao.html" class="selec icon">
                <img src="../ICONES/notific_header.png" alt="Notificações" height="30px" width="30px" />
            </a>
        </div>
    </header>

    <main class="conteudo">

        <section class="cabecalho-pagina">

            <div class="caminho-pagina">
                SERVIÇOS / CADASTRO
            </div>

            <h1 class="titulo-pagina">
                ‹ Cadastro de Pet
            </h1>

            <p class="subtitulo-pagina">
                Cadastre seu pet no sistema do Programa ARCA
            </p>

        </section>

        <section class="cartao">

            <h2 class="titulo-secao">
                Informações do Pet
            </h2>

            <div class="grade-formulario">

                <input type="text" placeholder="Nome do Pet">

                <select>
                    <option>Selecione Espécie</option>
                    <option>Cachorro</option>
                    <option>Gato</option>
                </select>

                <select>
                    <option>Selecione Raça</option>
                </select>

                <input type="text" placeholder="Ex: 2 anos">

                <select>
                    <option>Selecione Gênero</option>
                </select>

                <input type="text" placeholder="Digite a cor predominante">

                <input type="number" placeholder="Peso (kg)" class="campo-inteiro">

                <textarea placeholder="Observações" class="campo-inteiro"></textarea>

                <div class="upload-arquivo campo-inteiro">
                    <input type="file">
                </div>

            </div>

            <div class="area-botoes">
                <button class="botao-cancelar">Cancelar</button>
                <button class="botao-salvar">Salvar</button>
            </div>

        </section>

    </main>

    <footer class="rodape">
        © Copyright GroupTwo
    </footer>

</body>

</html>
