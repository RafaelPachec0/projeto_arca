<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de ONG</title>

    <link rel="stylesheet" href="../CSS/CadastarOngs_style.css">
    <link rel="stylesheet" href="../CSS/Estilo_style.css">
</head>

<body>

<header class="cabecalho-superior">

    <div class="logo-arca">
        <img src="../IMG/arca-removebg-preview.png" alt="Programa ARCA">
    </div>

    <nav class="menu-navegacao">
        <a href="#">Início</a>
        <a href="#">Perfil</a>
        <a href="#">Ajuda</a>
    </nav>

    <div class="area-icones">
        <span class="icone-configuracao">⚙</span>
        <img src="../IMG/sino.png" alt="Notificações">
    </div>

</header>

<main class="conteudo">

    <section class="cabecalho-pagina">

        <div class="caminho-pagina">
            PREFEITURA / CADASTRO DE ONG
        </div>

        <h1 class="titulo-pagina">
            ‹ Cadastro de ONG
        </h1>

        <p class="subtitulo-pagina">
            Registre uma nova organização parceira do Programa ARCA.
        </p>

    </section>

    <section class="cartao">

        <h2 class="titulo-secao">
            Informações da ONG
        </h2>

        <div class="grade-formulario">

            <input type="text" placeholder="Nome da ONG">

            <input type="text" placeholder="CNPJ">

            <input type="text" placeholder="Responsável">

            <input type="email" placeholder="E-mail">

            <input type="text" placeholder="Telefone">

            <input type="text" placeholder="Cidade">

            <input type="text"
                   placeholder="Endereço completo"
                   class="campo-inteiro">

            <textarea
                placeholder="Descrição da ONG"
                class="campo-inteiro">
            </textarea>

            <div class="upload-arquivo campo-inteiro">
                <input type="file">
            </div>

        </div>

        <div class="area-botoes">

            <button class="botao-cancelar">
                Cancelar
            </button>

            <button class="botao-confirmar">
                Cadastrar ONG
            </button>

        </div>

    </section>

</main>

<footer class="rodape">
    © Copyright GroupTwo
</footer>

</body>
</html>
