<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitação de Vacinação</title>
    <link rel="stylesheet" href="../CSS/vacinacao.css">
    <link rel="stylesheet" href="../CSS/style.css">
</head>

<body>
    <header>
        <div class="logo">
            <h2>Projeto ARCA</h2>
        </div>
        <nav class="menu-central">
            <a href="home.html" class="selec">Início</a>
            <a href="pag_perfil.html" class="selec">Perfil</a>
            <a href="pag_ajuda.html" class="selec">Ajuda</a>
        </nav>
        <div class="icones-apoio">
            <a href="#" class="selec icon"><img src="../ICONES/config.png" alt="Configurações" height="30px"
                    width="30px"></a>
            <a href="../PAG_NOTIFICACAO/pag_notificacao.html" class="selec icon"><img src="../ICONES/notific_header.png"
                    alt="Notificações" height="30px" width="30px"></a>
        </div>
    </header>

    <main class="conteudo">

        <section class="cabecalho-pagina">

            <div class="caminho-pagina">
                SERVIÇOS / VACINAÇÃO
            </div>

            <h1 class="titulo-pagina">
                <a href="home.html"><span style="font-size: 40px">&lt; </span></a>
                Solicitação de Vacinação
            </h1>

            <p class="subtitulo-pagina">
                Agende a vacinação do seu pet
            </p>

        </section>

        <section class="cartao">

            <h2 class="titulo-secao">
                Dados da Solicitação
            </h2>

            <div class="grade-formulario">

                <select>
                    <option>Selecione Espécie</option>
                    <option>Cachorro</option>
                    <option>Gato</option>
                </select>

                <input type="text" placeholder="Ex: 2 anos">

                <input type="text" placeholder="Digite seu bairro">

                <select>
                    <option>Selecione local de preferência</option>
                </select>

                <div class="upload-arquivo campo-inteiro">
                    <input type="file">
                </div>

            </div>

            <div class="declaracao-legal">

                <h2 class="titulo-secao">
                    Declaração Legal
                </h2>

                <div class="caixa-declaracao">
                    <input type="checkbox">
                    Resido no município de Serra
                </div>

                <div class="caixa-declaracao">
                    <input type="checkbox">
                    O animal está em boas condições de saúde
                </div>

            </div>

            <div class="area-botoes">

                <button class="botao-cancelar">
                    Cancelar
                </button>

                <button class="botao-confirmar">
                    Enviar Solicitação
                </button>

            </div>

        </section>

    </main>

    <footer class="rodape">
        © Copyright GroupTwo
    </footer>

</body>

</html>
