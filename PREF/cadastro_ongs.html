<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de ONG</title>
    <link rel="stylesheet" href="/CSS/style.css" />
    <link rel="stylesheet" href="/CSS/cadastro.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <h2>Projeto ARCA</h2>
      </div>
      <nav class="menu-central">
        <a href="#" class="selec">Início</a>
        <a href="#" class="selec">Perfil</a>
        <a href="#" class="selec">Ajuda</a>
      </nav>
      <div class="icones-apoio">
        <a href="#" class="selec icon"
          ><img
            src="../ICONES/config.png"
            alt="Configurações"
            height="30px"
            width="30px"
        /></a>
        <a href="../PAG_NOTIFICACAO/pag_notificacao.html" class="selec icon"
          ><img
            src="../ICONES/notific_header.png"
            alt="Notificações"
            height="30px"
            width="30px"
        /></a>
      </div>
    </header>

    <div class="container">
      <div class="titulo">
        <p><b>PREFEITURA / CADASTRO DE ONG</b></p>
        <h1>
          <a href="gestao_geral_pref.html"
            ><span style="font-size: 40px">&lt; </span></a
          >Cadastro de ONG
        </h1>
        <p>Registre uma nova organização parceira do Programa ARCA.</p>
      </div>

      <div class="cartao">
        <h2 class="titulo-secao">Informações da ONG</h2>

        <div class="grade-formulario">
          <input type="text" placeholder="Nome da ONG" />
          <input type="text" placeholder="CNPJ" />
          <input type="text" placeholder="Responsável" />
          <input type="email" placeholder="E-mail" />
          <input type="text" placeholder="Telefone" />
          <input type="text" placeholder="Cidade" />
          <input
            type="text"
            placeholder="Endereço completo"
            class="campo-inteiro"
          />
          <textarea
            placeholder="Descrição da ONG"
            class="campo-inteiro"
          ></textarea>
          <div class="upload-arquivo campo-inteiro">
            <input type="file" />
          </div>
        </div>

        <div class="area-botoes">
          <button class="botao-cancelar">Cancelar</button>
          <button class="botao-confirmar">Cadastrar ONG</button>
        </div>
      </div>
    </div>

    <footer>
      <p>© Copyright GroupTwo</p>
    </footer>
  </body>
</html>
